name: CI
permissions:
  contents: read

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency smoke check
        run: |
          python -c "import pandas, numpy, pyarrow, yaml, yfinance, matplotlib"

      - name: Syntax check
        run: |
          python -m compileall src